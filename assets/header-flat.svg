<svg width="1280" height="400" viewBox="0 0 1280 400" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="1" stop-color="#0E1526"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6366F1" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="1280" height="400" rx="20" fill="url(#bg)"/>
  <rect x="0.75" y="0.75" width="1278.5" height="398.5" rx="19.25" stroke="#1E293B" stroke-width="1.5"/>
  <ellipse cx="230" cy="200" rx="320" ry="260" fill="url(#glow)"/>

  <!-- ============ FUNNEL MARK ============ -->
  <!-- incoming signals -->
  <g>
    <circle cx="95"  cy="52" r="4" fill="#64748B"/>
    <circle cx="140" cy="38" r="3" fill="#475569"/>
    <circle cx="185" cy="60" r="5" fill="#818CF8"/>
    <circle cx="225" cy="42" r="3" fill="#475569"/>
    <circle cx="265" cy="58" r="4" fill="#64748B"/>
    <circle cx="305" cy="40" r="3" fill="#475569"/>
    <circle cx="345" cy="56" r="4" fill="#22D3EE"/>
    <circle cx="380" cy="46" r="3" fill="#475569"/>
    <circle cx="110" cy="84" r="3" fill="#475569"/>
    <circle cx="160" cy="92" r="4" fill="#64748B"/>
    <circle cx="205" cy="80" r="3" fill="#475569"/>
    <circle cx="250" cy="94" r="4" fill="#818CF8"/>
    <circle cx="295" cy="82" r="3" fill="#475569"/>
    <circle cx="335" cy="92" r="4" fill="#64748B"/>
    <circle cx="370" cy="84" r="3" fill="#475569"/>
    <circle cx="75"  cy="72" r="3" fill="#475569"/>
  </g>

  <!-- funnel walls -->
  <path d="M80 110 L114 156 L148 202 L184 248 L220 300" stroke="#334155" stroke-width="1.5" stroke-opacity="0.55" fill="none" stroke-linejoin="round"/>
  <path d="M380 110 L346 156 L312 202 L276 248 L240 300" stroke="#334155" stroke-width="1.5" stroke-opacity="0.55" fill="none" stroke-linejoin="round"/>

  <!-- refinement bars (discover -> stress-test -> rank -> spec) -->
  <rect x="80"  y="110" width="300" height="30" rx="6" fill="#2E3A55"/>
  <rect x="114" y="156" width="232" height="30" rx="6" fill="#3B4FB0"/>
  <rect x="148" y="202" width="164" height="30" rx="6" fill="#5B6CF0"/>
  <rect x="184" y="248" width="92"  height="30" rx="6" fill="#818CF8"/>

  <!-- gated, approved output -->
  <g filter="url(#soft)">
    <circle cx="230" cy="313" r="16" fill="url(#amber)"/>
  </g>
  <path d="M222 313 l6 6 l10 -13" stroke="#0B1020" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ============ WORDMARK ============ -->
  <g font-family="'Cascadia Code','Consolas','SF Mono',monospace">
    <text x="470" y="196" font-size="78" font-weight="700" letter-spacing="-1">
      <tspan fill="#818CF8">pm</tspan><tspan fill="#475569">-</tspan><tspan fill="#F1F5F9">system</tspan>
    </text>
  </g>
  <rect x="890" y="148" width="20" height="54" rx="3" fill="#FBBF24"/>

  <!-- tagline -->
  <text x="472" y="246" font-size="27" fill="#94A3B8">A product manager that runs as a <tspan fill="#CBD5E1" font-weight="600">funnel</tspan>.</text>

  <!-- pipeline strip -->
  <g font-family="'Cascadia Code','Consolas',monospace" font-size="18">
    <text x="472" y="298" fill="#64748B">
      discover <tspan fill="#6366F1">→</tspan> stress-test <tspan fill="#6366F1">→</tspan> rank <tspan fill="#6366F1">→</tspan> spec <tspan fill="#6366F1">→</tspan> <tspan fill="#F59E0B">✓ ship</tspan>
    </text>
  </g>
</svg>
