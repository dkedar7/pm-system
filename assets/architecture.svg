<svg width="1280" height="520" viewBox="0 0 1280 520" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#E8EDF4"/>
    </pattern>
    <filter id="card" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.07"/>
    </filter>
    <marker id="ar" viewBox="0 0 8 8" markerWidth="7" markerHeight="7" refX="6" refY="4" orient="auto-start-reverse">
      <path d="M1 1 L7 4 L1 7 Z" fill="#818CF8"/>
    </marker>
    <marker id="arS" viewBox="0 0 8 8" markerWidth="7" markerHeight="7" refX="6" refY="4" orient="auto-start-reverse">
      <path d="M1 1 L7 4 L1 7 Z" fill="#94A3B8"/>
    </marker>
  </defs>

  <!-- canvas -->
  <rect width="1280" height="520" rx="18" fill="#FBFCFE"/>
  <rect width="1280" height="520" rx="18" fill="url(#dots)" opacity="0.7"/>
  <rect x="0.75" y="0.75" width="1278.5" height="518.5" rx="17.25" stroke="#E6EBF2" stroke-width="1.5"/>

  <!-- title -->
  <text x="44" y="54" font-family="'Cascadia Code','Consolas',monospace" font-size="21" font-weight="700">
    <tspan fill="#6366F1">pm</tspan><tspan fill="#94A3B8">-</tspan><tspan fill="#0F172A">system</tspan>
  </text>
  <text x="170" y="54" font-size="15" fill="#64748B">architecture</text>
  <text x="1236" y="54" text-anchor="end" font-size="13" fill="#94A3B8">discovery &#8594; delegation, over one persistent backlog</text>

  <!-- ============ SIGNALS (left) ============ -->
  <text x="44" y="120" font-family="'Cascadia Code','Consolas',monospace" font-size="11" letter-spacing="2" fill="#94A3B8">SIGNALS</text>
  <g font-size="11.5" fill="#475569">
    <g>
      <rect x="44" y="132" width="132" height="24" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
      <circle cx="60" cy="144" r="2.5" fill="#6366F1"/><text x="72" y="148">GitHub issues / PRs</text>
    </g>
    <g>
      <rect x="44" y="164" width="132" height="24" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
      <circle cx="60" cy="176" r="2.5" fill="#6366F1"/><text x="72" y="180">Hacker News</text>
    </g>
    <g>
      <rect x="44" y="196" width="132" height="24" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
      <circle cx="60" cy="208" r="2.5" fill="#6366F1"/><text x="72" y="212">Reddit</text>
    </g>
    <g>
      <rect x="44" y="228" width="132" height="24" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
      <circle cx="60" cy="240" r="2.5" fill="#6366F1"/><text x="72" y="244">X / Twitter</text>
    </g>
    <g>
      <rect x="44" y="260" width="132" height="24" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
      <circle cx="60" cy="272" r="2.5" fill="#6366F1"/><text x="72" y="276">changelogs, docs</text>
    </g>
  </g>
  <!-- fan into discover -->
  <g stroke="#CBD5E1" stroke-width="1.2" opacity="0.9" fill="none">
    <path d="M176 144 C 196 144, 192 198, 206 198"/>
    <path d="M176 176 C 194 176, 192 198, 206 198"/>
    <path d="M176 208 L 206 200"/>
    <path d="M176 240 C 194 240, 192 200, 206 200"/>
    <path d="M176 272 C 196 272, 192 200, 206 200"/>
  </g>

  <!-- ============ PIPELINE ============ -->
  <!-- flow arrows -->
  <g stroke="#818CF8" stroke-width="1.6">
    <line x1="358" y1="198" x2="380" y2="198" marker-end="url(#ar)"/>
    <line x1="536" y1="198" x2="558" y2="198" marker-end="url(#ar)"/>
    <line x1="714" y1="198" x2="736" y2="198" marker-end="url(#ar)"/>
    <line x1="892" y1="198" x2="912" y2="198" marker-end="url(#ar)"/>
    <line x1="1002" y1="198" x2="1022" y2="198" marker-end="url(#ar)"/>
  </g>

  <!-- stage: Discover -->
  <g>
    <rect x="206" y="148" width="150" height="100" rx="14" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#card)"/>
    <circle cx="230" cy="182" r="13" fill="#EEF2FF"/><text x="230" y="186" text-anchor="middle" font-size="12" font-weight="700" fill="#6366F1">1</text>
    <text x="250" y="187" font-size="16" font-weight="700" fill="#1E293B">Discover</text>
    <text x="224" y="222" font-size="11.5" fill="#64748B">multi-source signals</text>
  </g>
  <!-- stage: Stress-test -->
  <g>
    <rect x="384" y="148" width="150" height="100" rx="14" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#card)"/>
    <circle cx="408" cy="182" r="13" fill="#EEF2FF"/><text x="408" y="186" text-anchor="middle" font-size="12" font-weight="700" fill="#6366F1">2</text>
    <text x="428" y="187" font-size="16" font-weight="700" fill="#1E293B">Stress-test</text>
    <text x="402" y="222" font-size="11.5" fill="#64748B">adversarial kill-test</text>
  </g>
  <!-- stage: Rerank -->
  <g>
    <rect x="562" y="148" width="150" height="100" rx="14" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#card)"/>
    <circle cx="586" cy="182" r="13" fill="#EEF2FF"/><text x="586" y="186" text-anchor="middle" font-size="12" font-weight="700" fill="#6366F1">3</text>
    <text x="606" y="187" font-size="16" font-weight="700" fill="#1E293B">Rerank</text>
    <text x="580" y="222" font-size="11.5" fill="#64748B">RICE value / effort</text>
  </g>
  <!-- stage: Spec -->
  <g>
    <rect x="740" y="148" width="150" height="100" rx="14" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#card)"/>
    <circle cx="764" cy="182" r="13" fill="#EEF2FF"/><text x="764" y="186" text-anchor="middle" font-size="12" font-weight="700" fill="#6366F1">4</text>
    <text x="784" y="187" font-size="16" font-weight="700" fill="#1E293B">Spec</text>
    <text x="758" y="222" font-size="11.5" fill="#64748B">requirements doc</text>
  </g>

  <!-- HUMAN GATE -->
  <g>
    <rect x="916" y="148" width="86" height="100" rx="14" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
    <rect x="951" y="180" width="16" height="13" rx="2" fill="#F59E0B"/>
    <path d="M954 180 v-3 a5 5 0 0 1 10 0 v3" stroke="#F59E0B" stroke-width="2" fill="none"/>
    <text x="959" y="214" text-anchor="middle" font-size="12.5" font-weight="700" fill="#B45309">human</text>
    <text x="959" y="230" text-anchor="middle" font-size="12.5" font-weight="700" fill="#B45309">gate</text>
  </g>
  <text x="959" y="268" text-anchor="middle" font-size="11" fill="#B45309">halts for your approval</text>

  <!-- Delegate -->
  <g>
    <rect x="1022" y="148" width="150" height="100" rx="14" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#card)"/>
    <circle cx="1046" cy="182" r="13" fill="#EEF2FF"/><text x="1046" y="186" text-anchor="middle" font-size="13" font-weight="700" fill="#6366F1">&#10003;</text>
    <text x="1066" y="187" font-size="16" font-weight="700" fill="#1E293B">Delegate</text>
    <text x="1040" y="222" font-size="11.5" fill="#64748B">to ce-plan / lfg</text>
  </g>

  <!-- ============ BACKLOG LOOP ============ -->
  <!-- persist ticks -->
  <g stroke="#CBD5E1" stroke-width="1.2" stroke-dasharray="3 4" opacity="0.8">
    <line x1="459" y1="248" x2="459" y2="384"/>
    <line x1="637" y1="248" x2="637" y2="384"/>
    <line x1="815" y1="248" x2="815" y2="384"/>
  </g>
  <!-- delegate -> backlog (persist) -->
  <line x1="1097" y1="248" x2="1097" y2="382" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arS)"/>
  <!-- backlog -> discover (loop / re-ingest) -->
  <line x1="281" y1="384" x2="281" y2="250" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arS)"/>

  <!-- backlog bar -->
  <rect x="262" y="384" width="838" height="58" rx="29" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.2"/>
  <!-- db icon -->
  <g>
    <ellipse cx="300" cy="406" rx="11" ry="4" fill="#6366F1"/>
    <rect x="289" y="406" width="22" height="14" fill="#6366F1"/>
    <ellipse cx="300" cy="420" rx="11" ry="4" fill="#4F46E5"/>
    <ellipse cx="300" cy="406" rx="11" ry="4" fill="#818CF8"/>
  </g>
  <text x="330" y="409" font-size="15" font-weight="600" fill="#334155">persistent, deduplicated opportunity backlog</text>
  <text x="330" y="428" font-size="11.5" fill="#64748B">every stage reads &amp; writes &#183; the funnel loops &#183; nothing ships without the gate</text>
  <rect x="1006" y="400" width="74" height="24" rx="12" fill="#EEF2FF" stroke="#C7D2FE"/>
  <text x="1043" y="416" text-anchor="middle" font-family="'Cascadia Code','Consolas',monospace" font-size="12" font-weight="700" fill="#4F46E5">SQLite</text>

  <!-- loop labels -->
  <text x="290" y="320" font-size="10.5" fill="#94A3B8">loop</text>
  <text x="1106" y="320" text-anchor="start" font-size="10.5" fill="#94A3B8">persist</text>

  <!-- footnote -->
  <text x="262" y="478" font-size="11" fill="#94A3B8">Stress-test refutes on four axes: already-solved &#183; pain-is-rare &#183; infeasible &#183; won&#8217;t-be-adopted.</text>
</svg>
